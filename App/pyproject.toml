[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
target-version = "py313"
line-length = 100
extend-exclude = ["venv"]

[tool.ruff.lint]
select = ["F", "E9"]

[tool.mypy]
python_version = "3.13"
files = ["app.py", "contracts", "db", "routes", "services", "utils"]
ignore_missing_imports = true
follow_imports = "skip"
exclude = ["venv", "tests"]
warn_unused_configs = true
check_untyped_defs = false
